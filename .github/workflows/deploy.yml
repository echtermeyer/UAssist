name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/deploy/UAssist
            git pull origin main

            cd whatsapp-integration
            npm install --production
            pm2 reload uassist || pm2 start /home/deploy/ecosystem.config.js --only uassist

            cd ../email-integration
            npm install --production
            pm2 reload email || pm2 start /home/deploy/ecosystem.config.js --only email

            cd ../signal-integration
            npm install --production
            pm2 reload signal || pm2 start /home/deploy/ecosystem.config.js --only signal

            cd ../api
            npm install --production
            pm2 reload api || pm2 start /home/deploy/ecosystem.config.js --only api

            pm2 save
