name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/deploy/UAssist
            git pull origin main

            cd api && npm install --production && cd ..
            cd whatsapp-integration && npm install --production && cd ..
            cd signal-integration && npm install --production && cd ..
            cd email-integration && npm install --production && cd ..
            cd slack-integration && npm install --production && cd ..

            cd frontend-app
            npm install
            npm run build
            cd ..

            pm2 reload api --update-env
            pm2 reload frontend --update-env

            pm2 jlist | python3 -c "
            import sys, json, subprocess
            for p in json.load(sys.stdin):
                name = p['name']
                if any(name.startswith(x) for x in ['uassist_', 'signal_', 'email_', 'slack_']):
                    subprocess.run(['pm2', 'reload', name, '--update-env'])
            "

            pm2 save
